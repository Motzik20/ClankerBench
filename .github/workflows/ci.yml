name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Run lint
        run: uv run ruff check
      - name: Run type-check
        run: uv run pyrefly check --summarize-errors
      - name: Run tests
        run: uv run pytest -v

  build:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Build
        run: uv build --wheel
